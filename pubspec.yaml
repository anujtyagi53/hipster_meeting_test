publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.6.6
  dio: ^5.7.0
  dartz: ^0.10.1
  shared_preferences: ^2.2.3
  permission_handler: ^12.0.1
  connectivity_plus: ^7.1.0
  flutter_easyloading: ^3.0.3
  google_fonts: ^8.0.2
  intl: ^0.20.2
  wakelock_plus: ^1.5.1
  flutter_dotenv: ^6.0.0
  share_plus: ^12.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  assets:
    - .env
