<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join Hipster Meeting</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #fff;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .container {
            text-align: center;
            padding: 40px 24px;
            max-width: 400px;
        }
        .icon {
            width: 80px;
            height: 80px;
            background: rgba(0, 188, 212, 0.15);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 36px;
        }
        h1 { font-size: 24px; margin-bottom: 8px; }
        .subtitle { color: #8888aa; font-size: 14px; margin-bottom: 32px; }
        .meeting-id {
            background: #16213e;
            border: 1px solid #333;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 24px;
            font-family: monospace;
            font-size: 13px;
            word-break: break-all;
            color: #00bcd4;
        }
        .btn {
            display: inline-block;
            background: #00bcd4;
            color: #fff;
            padding: 14px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
            width: 100%;
        }
        .btn:active { opacity: 0.8; }
        .copy-btn {
            background: #16213e;
            border: 1px solid #333;
            color: #8888aa;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            margin-bottom: 24px;
        }
        .copy-btn:active { opacity: 0.8; }
        .help {
            color: #666;
            font-size: 12px;
            line-height: 1.6;
        }
        .spinner {
            display: none;
            margin: 16px auto;
            width: 32px;
            height: 32px;
            border: 3px solid #333;
            border-top-color: #00bcd4;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        .status { color: #00bcd4; font-size: 14px; display: none; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <div class="icon">📹</div>
        <h1>Hipster Meeting</h1>
        <p class="subtitle">You've been invited to a 1:1 video call</p>

        <div class="meeting-id" id="meetingIdDisplay">Loading...</div>

        <div class="spinner" id="spinner"></div>
        <p class="status" id="status">Opening app...</p>

        <a class="btn" id="openBtn" href="#">Open in App</a>

        <button class="copy-btn" id="copyBtn" onclick="copyCode()">Copy Meeting Code</button>

        <p class="help">
            If the app doesn't open, install <strong>Hipster Meeting</strong> on your device,
            then tap "Open in App" again or paste the meeting code manually.
        </p>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const meetingId = params.get('meetingId') || '';
        const cell = params.get('c') || '';
        const region = params.get('r') || '';

        // Build deep link using intent:// scheme for Android App Links
        let deepLink = 'intent://anujtyagi53.github.io/hipster_meeting_test/join.html?meetingId=' + encodeURIComponent(meetingId);
        if (cell) deepLink += '&c=' + encodeURIComponent(cell);
        if (region) deepLink += '&r=' + encodeURIComponent(region);
        deepLink += '#Intent;scheme=https;package=com.hipster.hipster_meeting_test;end';

        // Build join code for manual entry
        let joinCode = meetingId;
        if (cell && region) joinCode = meetingId + ':' + cell + ':' + region;

        // Display
        document.getElementById('meetingIdDisplay').textContent = meetingId || 'No meeting ID provided';
        document.getElementById('openBtn').href = deepLink;

        // Auto-redirect on page load
        if (meetingId) {
            document.getElementById('spinner').style.display = 'block';
            document.getElementById('status').style.display = 'block';
            setTimeout(function() {
                window.location.href = deepLink;
            }, 500);
            // Hide spinner after 3s (app either opened or didn't)
            setTimeout(function() {
                document.getElementById('spinner').style.display = 'none';
                document.getElementById('status').style.display = 'none';
            }, 3000);
        }

        function copyCode() {
            navigator.clipboard.writeText(joinCode).then(function() {
                var btn = document.getElementById('copyBtn');
                btn.textContent = 'Copied!';
                setTimeout(function() { btn.textContent = 'Copy Meeting Code'; }, 2000);
            });
        }
    </script>
</body>
</html>
